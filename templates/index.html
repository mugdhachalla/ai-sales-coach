<!DOCTYPE html>
<html>
<head>
    <title>SalesCoach AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

<nav class="navbar">
<a class="logo" href="{{ url_for('home') }}">SalesCoach AI </a>

<div class="nav-links">
<a href="{{ url_for('upload_page') }}" class="nav-button">Start Training</a>
</div>
</nav>

<div class="container">

<h1>SalesCoach AI</h1>
<p class="subtitle">Upload a product brochure and practice your sales pitch</p>

<div class="card">

<form id="uploadForm" action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">

<label>Upload Brochure:</label>
<input type="file" name="brochure" required>

<label>Industry:</label>
<input type="text" name="industry" placeholder="e.g. Real Estate, Healthcare" required>

<button type="submit" id="submitBtn">Generate Training Material</button>

<div id="spinner" class="spinner hidden"></div>
<p id="loadingText" class="loading-text hidden">Processing your brochure...</p>

</form>


</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', function() {
  document.getElementById('submitBtn').classList.add('hidden');
  document.getElementById('spinner').classList.remove('hidden');
  document.getElementById('loadingText').classList.remove('hidden');
});
</script>

</div>

</body>
</html>
